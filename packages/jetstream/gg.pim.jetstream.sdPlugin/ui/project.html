<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; padding: 8px 10px; background: #2d2d2d; color: #d8d8d8;
         font: 13px -apple-system, "Segoe UI", sans-serif; }
  .row { display: flex; align-items: center; margin: 8px 0; }
  label { flex: 0 0 88px; color: #969696; }
  input { flex: 1; background: #3d3d3d; color: #fff; border: 1px solid #555;
          border-radius: 4px; padding: 6px 8px; font-size: 13px; }
  input:focus { outline: none; border-color: #0091ff; }
  p.hint { color: #7a7a7a; font-size: 11px; margin: 6px 0 0; }
</style>
</head>
<body>
  <div class="row">
    <label for="name">Name</label>
    <input id="name" data-setting="name" placeholder="falcon (defaults to folder name)" />
  </div>
  <div class="row">
    <label for="path">Project path</label>
    <input id="path" data-setting="path" placeholder="/Users/you/projects/falcon" />
  </div>
  <p class="hint">The key glows with the live Claude status of any session running under this
  path. Press it to open a terminal there with <code>claude --continue</code>.</p>
  <p class="hint">Prefer no per-key setup? Add your repos in the <strong>Jetstream settings</strong>
  key's Fleet editor — the Fleet &amp; Attention keys then cover every repo at once.</p>
  <script src="pi.js"></script>
</body>
</html>
