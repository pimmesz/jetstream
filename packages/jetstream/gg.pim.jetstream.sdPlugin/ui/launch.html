<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; padding: 8px 10px; background: #2d2d2d; color: #d8d8d8;
         font: 13px -apple-system, "Segoe UI", sans-serif; }
  .row { display: flex; align-items: flex-start; margin: 8px 0; }
  label { flex: 0 0 88px; color: #969696; padding-top: 6px; }
  input, textarea { flex: 1; background: #3d3d3d; color: #fff; border: 1px solid #555;
          border-radius: 4px; padding: 6px 8px; font-size: 13px; font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: #0091ff; }
  textarea { min-height: 64px; resize: vertical; }
  p.hint { color: #7a7a7a; font-size: 11px; margin: 6px 0 0; }
</style>
</head>
<body>
  <div class="row">
    <label for="name">Name</label>
    <input id="name" data-setting="name" placeholder="fix TODOs" />
  </div>
  <div class="row">
    <label for="path">Project path</label>
    <input id="path" data-setting="path" placeholder="/Users/you/projects/falcon" />
  </div>
  <div class="row">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" data-setting="prompt" placeholder="Resolve one small TODO and summarize what you changed."></textarea>
  </div>
  <div class="row">
    <label for="model">Model</label>
    <input id="model" data-setting="model" placeholder="(optional) e.g. claude-sonnet-5" />
  </div>
  <div class="row">
    <label for="permissionMode">Permissions</label>
    <input id="permissionMode" data-setting="permissionMode" placeholder="(optional) e.g. default" />
  </div>
  <div class="row">
    <label for="allowedTools">Allowed tools</label>
    <input id="allowedTools" data-setting="allowedTools" placeholder="(optional) Read,Grep,Glob" />
  </div>
  <p class="hint">Runs headless <code>claude -p</code> in the project dir under your
  subscription login (API key stripped). Headless runs draw the Agent-SDK allotment,
  not the 5h/7d gauge.</p>
  <script src="pi.js"></script>
</body>
</html>
